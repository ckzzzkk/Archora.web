<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="400" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="3" stdDeviation="2.5" flood-color="#1a1a1a" flood-opacity="0.45"/>
    </filter>
    <filter id="shadowDeep" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="5" dy="5" stdDeviation="4" flood-color="#1a1a1a" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background - dusty coal dark -->
  <rect width="120" height="120" fill="#2A2A28"/>

  <!-- === LAYERED A (back layer - floor plan depth) - blue mirage === -->
  <!-- Layer 3 (deepest back) -->
  <g opacity="0.18" transform="translate(2, 4)">
    <path d="M38,20 C43,28 47,38 47,45 L47,65 L55,65 M38,45 L47,45"
          stroke="#89B4C8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Layer 2 (middle) -->
  <g opacity="0.35" transform="translate(1, 2)">
    <path d="M39,18 C44,27 48,38 48,45 L48,65 L56,65 M39,45 L48,45"
          stroke="#89B4C8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- === WAVE A (main legs with ocean wave flow) - matcha mist === -->
  <g filter="url(#shadowDeep)">
    <!-- Left wave leg - organic wave flow -->
    <path d="M36,18
             C40,22 42,30 44,38
             C46,46 50,52 54,58
             C57,63 60,65 60,65"
          stroke="#C5D4B8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Right wave leg -->
    <path d="M84,18
             C80,22 78,30 76,38
             C74,46 70,52 66,58
             C63,63 60,65 60,65"
          stroke="#C5D4B8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Crossbar with wave flow -->
  <g filter="url(#shadow)">
    <path d="M35,48 C45,46 55,46 65,48 C75,50 80,52 85,50"
          stroke="#C5D4B8" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- === COMPASS (integrated into crossbar) - blue mirage === -->
  <g filter="url(#shadow)">
    <!-- Compass outer ring -->
    <circle cx="60" cy="40" r="12" stroke="#7A9AAA" stroke-width="1.5" fill="none" opacity="0.8"/>

    <!-- 4-point compass star -->
    <path d="M60,28 L60,52 M48,40 L72,40"
          stroke="#C5D4B8" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Inner compass ring accent -->
    <circle cx="60" cy="40" r="4" stroke="#C5D4B8" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- Compass center dot with glow - blue mirage -->
  <circle cx="60" cy="40" r="3" fill="#89B4C8" filter="url(#glow)"/>

  <!-- Wave accent ripples - matcha mist -->
  <g opacity="0.25">
    <path d="M52,52 C55,54 58,55 60,56 C62,55 65,54 68,52"
          stroke="#A8B8A0" stroke-width="1" stroke-linecap="round" fill="none"/>
    <path d="M50,56 C54,58 57,59 60,60 C63,59 66,58 70,56"
          stroke="#A8B8A0" stroke-width="0.75" stroke-linecap="round" fill="none"/>
  </g>
</svg>