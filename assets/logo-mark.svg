<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Dark background -->
  <rect width="80" height="80" fill="#1A1A1A"/>

  <!-- Letterform: Narrow "A" -->
  <!-- Left leg: (28,12) to (20,65) -->
  <!-- Right leg: (52,12) to (60,65) -->
  <!-- Crossbar at y=46 -->
  <path d="M28,12 L20,65 M52,12 L60,65 M26,46 L54,46"
        stroke="#C8C8C8" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Compass outer ring -->
  <circle cx="40" cy="32" r="10" stroke="#5A5550" stroke-width="1" fill="none"/>

  <!-- 4-point compass star (N, E, S, W) -->
  <!-- N-S axis: (40,22) to (40,42) -->
  <!-- E-W axis: (30,32) to (50,32) -->
  <path d="M40,22 L40,42 M30,32 L50,32"
        stroke="#C8C8C8" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Compass center dot (Success Green) -->
  <circle cx="40" cy="32" r="2.5" fill="#7AB87A"/>
</svg>