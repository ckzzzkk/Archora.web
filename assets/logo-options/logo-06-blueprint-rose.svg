<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="400" height="400">
  <defs>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" fill="#2A2A28"/>

  <!-- Deep layered A's - blue mirage blueprint style -->
  <g opacity="0.15" transform="translate(6,6)">
    <path d="M32,20 L22,70 M88,20 L98,70 M28,48 L92,48" stroke="#89B4C8" stroke-width="3"/>
  </g>
  <g opacity="0.25" transform="translate(3,3)">
    <path d="M32,20 L22,70 M88,20 L98,70 M28,48 L92,48" stroke="#89B4C8" stroke-width="3"/>
  </g>

  <!-- Wave A - matcha mist -->
  <path d="M30,18 C36,30 42,42 48,52 C52,60 56,65 60,70" stroke="#C5D4B8" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M90,18 C84,30 78,42 72,52 C68,60 64,65 60,70" stroke="#C5D4B8" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Wave crossbar -->
  <path d="M26,47 C45,45 60,45 75,47 C82,48 88,49 92,48" stroke="#C5D4B8" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Compass rose - blue mirage -->
  <circle cx="60" cy="43" r="10" stroke="#7A9AAA" stroke-width="1.2" fill="none"/>
  <path d="M60,33 L60,53 M50,43 L70,43" stroke="#C5D4B8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M53,36 L60,43 L67,36" stroke="#C5D4B8" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M53,50 L60,43 L67,50" stroke="#C5D4B8" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <circle cx="60" cy="43" r="2.5" fill="#89B4C8" filter="url(#glowGreen)"/>
</svg>