<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="400" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="4" stdDeviation="3" flood-color="#1a1a1a" flood-opacity="0.6"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" fill="#2A2A28"/>

  <!-- Layered depth - 3 stacked A's -->
  <g opacity="0.2" transform="translate(3,3)">
    <path d="M35,20 L25,70 M85,20 L95,70" stroke="#89B4C8" stroke-width="4" stroke-linecap="round"/>
    <path d="M30,50 L90,50" stroke="#89B4C8" stroke-width="3" stroke-linecap="round"/>
  </g>
  <g opacity="0.4" transform="translate(1.5,1.5)">
    <path d="M35,20 L25,70 M85,20 L95,70" stroke="#89B4C8" stroke-width="4" stroke-linecap="round"/>
    <path d="M30,50 L90,50" stroke="#89B4C8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Main bold wave A - matcha mist -->
  <g filter="url(#shadow)">
    <path d="M34,18 C42,28 48,40 52,50 C56,60 58,65 60,70" stroke="#C5D4B8" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M86,18 C78,28 72,40 68,50 C64,60 62,65 60,70" stroke="#C5D4B8" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M30,48 C45,46 60,46 75,48 C80,49 85,50 90,49" stroke="#C5D4B8" stroke-width="4" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Compass - blue mirage -->
  <g>
    <circle cx="60" cy="42" r="14" stroke="#7A9AAA" stroke-width="1.5" fill="none"/>
    <path d="M60,28 L60,56 M46,42 L74,42" stroke="#C5D4B8" stroke-width="2" stroke-linecap="round"/>
    <circle cx="60" cy="42" r="3.5" fill="#89B4C8" filter="url(#glow)"/>
  </g>

  <!-- Wave ripples - dusty coal accent -->
  <g opacity="0.25">
    <path d="M52,58 C56,60 58,61 60,62 C62,61 64,60 68,58" stroke="#A8B8A0" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M50,62 C55,64 58,65 60,66 C62,65 65,64 70,62" stroke="#A8B8A0" stroke-width="0.8" stroke-linecap="round"/>
  </g>
</svg>