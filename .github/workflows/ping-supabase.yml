name: Weekly Supabase Ping

on:
  schedule:
    - cron: '0 16 * * 2'  # Every Tuesday at 4:00 PM UTC
  workflow_dispatch:          # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          set +e
          echo "Starting ping..."
          wget -S -O /tmp/response.txt --timeout=10 "${{ secrets.SUPABASE_PING_URL }}/health"
          RESULT=$?
          echo "wget exit code: $RESULT"
          echo "Ping complete with code: $RESULT"
