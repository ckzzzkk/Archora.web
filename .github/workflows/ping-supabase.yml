name: Weekly Supabase Ping

on:
  schedule:
    - cron: '0 16 * * 2'  # Every Tuesday at 4:00 PM UTC
  workflow_dispatch:          # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          wget -O- --timeout=10 "${{ secrets.SUPABASE_PING_URL }}/health" 2>&1
          [ $? -eq 0 ] || { echo "ping failed"; exit 1; }
          echo "ping successful"
