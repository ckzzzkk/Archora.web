name: Weekly Supabase Ping

on:
  schedule:
    - cron: '0 16 * * 2'  # Every Tuesday at 4:00 PM UTC
  workflow_dispatch:          # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_PING_URL }}
    steps:
      - name: Test network
        run: curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://github.com
      - name: Ping Supabase
        run: |
          set +e
          echo "Testing connection to ${SUPABASE_URL}/health"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${SUPABASE_URL}/health")
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "Connection failed"
            exit 1
          fi
          echo "Supabase ping successful"
