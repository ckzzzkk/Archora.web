name: Weekly Supabase Ping

on:
  schedule:
    - cron: '0 16 * * 2'  # Every Tuesday at 4:00 PM UTC
  workflow_dispatch:          # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          echo "Testing basic connectivity..."
          curl -s --max-time 10 https://www.google.com -o /dev/null -w "Google: %{http_code}\n"
          echo "Testing Supabase..."
          curl -s --max-time 10 "${{ secrets.SUPABASE_PING_URL }}/health" -o /dev/null -w "Supabase: %{http_code}\n"
          echo "Done"
        env:
          SUPABASE_PING_URL: ${{ secrets.SUPABASE_PING_URL }}
