name: Weekly Supabase Ping

on:
  schedule:
    - cron: '0 16 * * 2'  # Every Tuesday at 4:00 PM UTC
  workflow_dispatch:          # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          set +e
          wget -O- --timeout=10 "${{ secrets.SUPABASE_PING_URL }}/health"
          RESULT=$?
          if [ $RESULT -eq 0 ]; then
            echo "Supabase ping successful"
            exit 0
          else
            echo "Supabase ping failed (wget exit code: $RESULT)"
            exit 1
          fi
