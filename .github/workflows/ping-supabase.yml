name: Weekly Supabase Ping

on:
  schedule:
    - cron: '0 16 * * 2'  # Every Tuesday at 4:00 PM UTC
  workflow_dispatch:          # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          echo "Testing basic connectivity..."
          curl -s -o /dev/null -w "%{http_code}" -m 10 https://www.google.com
          echo ""
          echo "Testing Supabase..."
          curl -s -o /dev/null -w "%{http_code}" -m 10 "${{ secrets.SUPABASE_PING_URL }}/health"
          echo ""
        env:
          SUPABASE_PING_URL: ${{ secrets.SUPABASE_PING_URL }}
