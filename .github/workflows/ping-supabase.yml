name: Weekly Supabase Ping

on:
  schedule:
    - cron: '0 16 * * 2'  # Every Tuesday at 4:00 PM UTC
  workflow_dispatch:          # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          wget -S -O /tmp/ping.txt --timeout=10 "${{ secrets.SUPABASE_PING_URL }}/health" 2>&1 | grep "HTTP/" > /tmp/http_code.txt
          HTTP_CODE=$(grep -oP 'HTTP/\d\.\d \K\d+' /tmp/http_code.txt || echo "000")
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "000" ]; then
            echo "Supabase is reachable"
            exit 0
          else
            echo "Supabase ping failed"
            exit 1
          fi
