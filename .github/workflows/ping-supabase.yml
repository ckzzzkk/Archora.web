name: Weekly Supabase Ping

on:
  schedule:
    - cron: '0 16 * * 2'  # Every Tuesday at 4:00 PM UTC
  workflow_dispatch:          # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set URL
        run: |
          echo "SUPABASE_URL=https://harhahyurvxwnoxugehe.supabase.co" >> $GITHUB_ENV
      - name: Ping Supabase
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SUPABASE_URL/health")
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "000" ]; then
            echo "Connection failed"
            exit 1
          fi
          echo "Supabase ping successful"
