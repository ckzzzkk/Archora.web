name: Weekly Supabase Ping

on:
  schedule:
    - cron: '0 16 * * 2'  # Every Tuesday at 4:00 PM UTC
  workflow_dispatch:          # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          echo "Testing secret expansion..."
          echo "Secret: ${{ secrets.SUPABASE_PING_URL }}"
          curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ secrets.SUPABASE_PING_URL }}/health"
